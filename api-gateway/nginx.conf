events {}

http {
    server {
        listen 80;

        # Gateway health check
        location /health {
            default_type application/json;
            return 200 "{\"status\":\"UP\"}";
        }

        # Proxy to item service
        location /items {
            proxy_pass http://item-service:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy to order service
        location /orders {
            proxy_pass http://order-service:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Proxy to payment service
        location /payments {
            proxy_pass http://payment-service:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Optional: redirect trailing slashes to non-slash URLs (clean URLs)
        rewrite ^/items/$ /items permanent;
        rewrite ^/orders/$ /orders permanent;
        rewrite ^/payments/$ /payments permanent;
    }
}